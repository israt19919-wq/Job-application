<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind cdn file -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- icon added -->
    <link rel="shortcut icon" href="image.png" type="image/x-icon">

    <title>Job Application Tracker </title>
</head>
<body>
    <div
        class="bg-gradient-to-r from-blue-500/20 to-purple-600/20 backdrop-blur-lg border border-white/5  sticky top-0 z-50 ">
        <div class=" my-container py-1.5 flex justify-between items-center">
            <h2 class="heading linear font-bold text-[clamp(1.8rem,5vw,2.75rem)] ">Job Application Tracker</h2>

            
        </div>

    </div>

    
    <header>

        <div class="my-container  pt-[30px]">


            <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">

                <div
                    class="all-total-count  shadow p-4 flex justify-between  sm:flex-col sm:justify-start border-2 border-blue-950-500 rounded-[5px] border-blue-500">
                    <p class="font-semibold text-2xl text-blue-500 ">Total</p>
                    <p id="total" class="font-bold text-2xl text-blue-500">0</p>
                </div>

                <div
                    class="all-interview-count  shadow p-4 w-full flex justify-between  sm:flex-col sm:justify-start border-2 border-green-500 rounded-[5px]">
                    <p class="font-semibold text-green-500 text-2xl">Interview</p>
                    <p id="interview" class="font-bold text-2xl text-green-500">0</p>
                </div>

                <div
                    class="all-reject-count shadow p-4 flex justify-between sm:flex-col sm:justify-start border-2 border-red-500 rounded-[5px] ">
                    <p class="font-semibold text-red-500 text-2xl">Rejected</p>
                    <p id="rejected" class="font-bold text-2xl text-red-500">0</p>
                </div>
            </div>
            <hr class="my-9 text-amber-300">
        </div>

    </header>

    
</body>
</html>
